name: pub_gui
description: "A cross-platform GUI application for managing Flutter/Dart package dependencies from pub.dev"
publish_to: 'none'
version: 1.0.0+1

homepage: https://github.com/ardakoksal/pub_gui
repository: https://github.com/ardakoksal/pub_gui
issue_tracker: https://github.com/ardakoksal/pub_gui/issues

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  process_run: ^1.2.4
  file_selector: ^1.1.0
  url_launcher: ^6.3.2
  flutter_riverpod: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true